name: Surveillance stock Midea PortaSplit

on:
  schedule:
    # Toutes les 5 minutes (minimum autorisé par GitHub gratuitement)
    - cron: "*/5 * * * *"
  workflow_dispatch:
    # Permet aussi de lancer une vérification manuellement depuis l'onglet "Actions"

jobs:
  verifier-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer la vérification de stock
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python surveille_stock.py
